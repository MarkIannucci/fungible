name: Update Screenshots

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Always run on manual dispatch; otherwise only on new version tags
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "new=true" >> $GITHUB_OUTPUT
            echo "Manual dispatch — running regardless of version."
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "new=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
          else
            echo "new=true" >> $GITHUB_OUTPUT
            echo "New version: $TAG"
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.new == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.version.outputs.new == 'true'
        run: npm ci

      - name: Install screenshot tools
        if: steps.version.outputs.new == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb xterm imagemagick xdotool fonts-dejavu
          pip3 install -q Pillow

      - name: Take screenshots
        if: steps.version.outputs.new == 'true'
        env:
          DISPLAY: :99
          FUNGIBLE_DATA_DIR: /tmp/fungible-demo
        run: |
          Xvfb :99 -screen 0 1600x1000x24 &
          sleep 1

          # Launch xterm running the app in demo mode
          xterm \
            -fa 'DejaVu Sans Mono' -fs 13 \
            -geometry 130x42 \
            -bg '#1a1a1a' -fg '#d4d4d4' \
            -title 'fungible' \
            -e 'node --experimental-sqlite --no-warnings --import tsx/esm tui/index.tsx --demo' &

          sleep 10  # wait for app + demo data to initialize

          WIN=$(xdotool search --class "XTerm" | tail -1)
          xdotool windowfocus --sync "$WIN"
          sleep 0.5

          shoot() {
            local key="$1" name="$2"
            if [ -n "$key" ]; then
              xdotool key --window "$WIN" "$key"
              sleep 1.5
            fi
            import -window "$WIN" "docs/screenshots/$name.png"
            echo "captured $name"
          }

          shoot ""  dashboard
          shoot "2" transactions
          shoot "3" trends
          shoot "4" net-worth
          shoot "5" tags
          shoot "6" financial-health
          shoot "7" rules
          shoot "8" accounts

      - name: Rebuild GIF
        if: steps.version.outputs.new == 'true'
        run: |
          python3 << 'EOF'
          from PIL import Image
          import os

          dest = 'docs/screenshots'
          names = ['dashboard', 'transactions', 'trends', 'net-worth',
                   'tags', 'financial-health', 'rules', 'accounts']

          frames = []
          for name in names:
              img = Image.open(f'{dest}/{name}.png').convert('RGB')
              w, h = img.size
              new_w = 720
              img = img.resize((new_w, int(h * new_w / w)), Image.LANCZOS)
              frames.append(img)

          gf = [f.quantize(colors=256, method=Image.Quantize.MEDIANCUT) for f in frames]
          gf[0].save(
              f'{dest}/demo.gif',
              save_all=True, append_images=gf[1:],
              duration=2500, loop=0,
          )
          print(f"GIF: {os.path.getsize(f'{dest}/demo.gif') / 1024:.0f} KB")
          EOF

      - name: Open PR with updated screenshots
        if: steps.version.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BRANCH="screenshots/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/screenshots/

          if git diff --cached --quiet; then
            echo "No screenshot changes — skipping PR."
            exit 0
          fi

          git commit -m "Update screenshots for v$VERSION [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "Screenshots: v$VERSION" \
            --body "$(cat << 'BODY'
          Automated screenshot update from demo mode. Review the images and merge to update the README gallery.

          > Generated by the **Update Screenshots** workflow.
          BODY
          )" \
            --base main \
            --head "$BRANCH"
