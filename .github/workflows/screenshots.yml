name: Update Screenshots

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "new=true" >> $GITHUB_OUTPUT
            echo "Manual dispatch — running regardless of version."
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "new=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
          else
            echo "new=true" >> $GITHUB_OUTPUT
            echo "New version: $TAG"
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.new == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.version.outputs.new == 'true'
        run: npm ci

      - name: Record screenshots with VHS
        if: steps.version.outputs.new == 'true'
        uses: charmbracelet/vhs-action@v2
        with:
          path: scripts/demo.tape

      - name: Rebuild GIF from screenshots
        if: steps.version.outputs.new == 'true'
        run: |
          pip3 install -q Pillow
          python3 << 'EOF'
          from PIL import Image
          import os

          dest = 'docs/screenshots'
          names = ['dashboard', 'transactions', 'trends', 'net-worth',
                   'tags', 'financial-health', 'rules', 'accounts']

          frames = []
          for name in names:
              img = Image.open(f'{dest}/{name}.png').convert('RGB')
              w, h = img.size
              new_w = 720
              img = img.resize((new_w, int(h * new_w / w)), Image.LANCZOS)
              frames.append(img)

          gf = [f.quantize(colors=256, method=Image.Quantize.MEDIANCUT) for f in frames]
          gf[0].save(
              f'{dest}/demo.gif',
              save_all=True, append_images=gf[1:],
              duration=2500, loop=0,
          )
          print(f"GIF: {os.path.getsize(f'{dest}/demo.gif') / 1024:.0f} KB")
          EOF

      - name: Open PR with updated screenshots
        if: steps.version.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BRANCH="screenshots/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/screenshots/

          if git diff --cached --quiet; then
            echo "No screenshot changes — skipping PR."
            exit 0
          fi

          git commit -m "Update screenshots for v$VERSION [skip ci]"
          git push --force origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — updated branch in place."
          else
            gh pr create \
              --title "Screenshots: v$VERSION" \
              --body "Automated screenshot update from demo mode. Review and merge to update the README gallery." \
              --base main \
              --head "$BRANCH"
          fi
